# 任务 08 — 世界观(内容侧地基: 地区/标签/势力/荒诞边界)
name: worldview-v1
target_files: [02-worldview.md]
max_cards: 6
default_stake: normal
stake: {WV-04: high, WV-05: high}
critics: [一致性批判者, 叙事批判者, 体验批判者]
direction: >-
  本轮重点: 1) WV-05 荒诞分级样例库扩到每级 10 例(写进卡片或声明
  独立样例文件的路径与格式)——这是 LLM 评估对齐(EVAL-03)的关键
  资产; 2) WV-04 每个势力的利益函数用一句话公式化(老板=f(成绩,
  面子, 钱包, 顺从)式), 供 ACT-07/CAT 卡引用; 3) 地区与文化标签的
  数值修正范围确认在 NUM-02 带宽内; 4) WV-06 命名生成的中英双语
  约束与音节库规模给出量化要求; 5) 检查每个标签/势力是否都有对应
  事件池配额来源(EVT-07/NUM-05)。
