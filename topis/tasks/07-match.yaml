# 任务 07 — 比赛系统(可信度红线 + 叙事钩子的平衡)
name: match-v1
target_files: [09-match-system.md]
max_cards: 7
default_stake: normal
stake: {MAT-01: high, MAT-06: high}
critics: [一致性批判者, 数值批判者, 工程批判者, 叙事批判者]
direction: >-
  本轮重点: 1) MAT-01 控球段判定链的每环输入输出列成表(技能项、修正
  项、噪声项分开), 数值批判者按 NUM-02 流水线逐环核带宽; 2) MAT-06
  校准带逐项给出现实联赛参照来源说明(写"取自顶级联赛公开统计常识带"
  即可, 不需引文); 3) 关键时刻叙事分的查询成本(扫弧线/记忆/恩怨账本)
  工程评估, 给出预计算策略; 4) MAT-03 压力倒 U 曲线给出函数形式候选
  与参数带; 5) 确认"校准优先于戏剧"的冲突裁决在每个叙事修正卡中都有
  落点; 6) 比赛事件类型表与 EVT-01 category/ENG-04 schema 对齐。
