# 任务 15 — 全库巡检(第二遍 pass: 全部 refined 后跑, 只挑跨卡问题)
name: global-sweep-v1
target_files:
  - 01-engine-overview.md
  - 02-worldview.md
  - 03-narrative-director.md
  - 04-engine-catalog.md
  - 05-event-system.md
  - 06-actor-system.md
  - 07-relationship-system.md
  - 08-seed-system.md
  - 09-match-system.md
  - 10-art-style.md
  - 11-ux-interaction.md
  - 12-player-psychology.md
  - 13-evaluation-pipeline.md
  - 16-content-pipeline.md
  - 18-numeric-design.md
